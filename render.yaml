services:
  - type: web
    name: leboncap
    env: python
    buildCommand: pip install -r requirements.txt && FLASK_APP=wsgi:app flask db upgrade
    startCommand: gunicorn wsgi:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: leboncap-db
          property: connectionString
      - key: BREVO_LOGIN
        sync: false
      - key: BREVO_SMTP_KEY
        sync: false
      - key: SITE_URL
        value: https://leboncap.onrender.com

databases:
  - name: leboncap-db
    databaseName: leboncap
    user: leboncap
