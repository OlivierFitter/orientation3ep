{% extends "base.html" %}
{% block content %}
<section class="section-light">
    <div class="container form-container">
        <h1 class="form-title">Inscription gratuite 🎁</h1>
        <p class="form-sub">Créez votre compte pour accéder aux conseils essentiels.</p>

        <form method="POST" action="{{ url_for('auth.inscription') }}" class="form-card">

            <div class="form-group">
                <label for="nom">Nom *</label>
                <input type="text" id="nom" name="nom" required
                       placeholder="Votre nom" autocomplete="name">
            </div>

            <div class="form-group">
                <label for="email">Adresse e-mail *</label>
                <input type="email" id="email" name="email" required
                       placeholder="votre@email.com" autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Mot de passe * <small>(8 caractères minimum)</small></label>
                <input type="password" id="password" name="password" required
                       minlength="8" autocomplete="new-password">
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirmer le mot de passe *</label>
                <input type="password" id="confirm_password" name="confirm_password" required
                       minlength="8" autocomplete="new-password">
            </div>

            <!-- RGPD obligatoire -->
            <div class="form-group form-check">
                <input type="checkbox" id="rgpd_consent" name="rgpd_consent" required>
                <label for="rgpd_consent">
                    J'accepte la <a href="{{ url_for('public.politique_confidentialite') }}" target="_blank">
                    politique de confidentialité</a> et le traitement de mes données personnelles
                    conformément au RGPD. *
                </label>
            </div>

            <button type="submit" class="btn btn-primary btn-full">
                Créer mon compte gratuit
            </button>
        </form>

        <p class="form-footer">
            Déjà inscrit ? <a href="{{ url_for('auth.login') }}">Se connecter</a>
        </p>
    </div>
</section>
{% endblock %}
