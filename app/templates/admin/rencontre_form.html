{% extends "base.html" %}
{% block content %}
<section class="section-light">
<div class="container" style="max-width:640px;">

    <div class="admin-header">
        <h1>{% if event %}✏️ Modifier la rencontre{% else %}➕ Nouvelle rencontre{% endif %}</h1>
        <a href="{{ url_for('admin.rencontres') }}" class="btn btn-outline btn-sm">← Rencontres</a>
    </div>

    <form method="POST" class="form-card">

        <div class="form-group">
            <label for="titre">Titre de la rencontre *</label>
            <input type="text" id="titre" name="titre" required
                   value="{{ event.titre if event else '' }}"
                   placeholder="Ex : Comprendre Parcoursup en 2h">
        </div>

        <div class="form-group">
            <label for="thematique">Thématique *</label>
            <input type="text" id="thematique" name="thematique" required
                   value="{{ event.thematique if event else '' }}"
                   placeholder="Ex : Parcoursup, Orientation 3e, Terminale...">
        </div>

        <div class="form-group">
            <label for="precisions">Précisions / Programme <span style="font-weight:400;font-size:0.85rem;">(optionnel)</span></label>
            <textarea id="precisions" name="precisions" rows="4"
                      placeholder="Détails du programme, prérequis, objectifs...">{{ event.precisions if event else '' }}</textarea>
        </div>

        <div class="form-group">
            <label for="date_event">Date et heure *</label>
            <input type="datetime-local" id="date_event" name="date_event" required
                   value="{{ event.date_event.strftime('%Y-%m-%dT%H:%M') if event else '' }}">
        </div>

        <div class="form-row">
            <div class="form-group" style="flex:1;">
                <label for="mode">Mode *</label>
                <select id="mode" name="mode" onchange="toggleLieu()">
                    <option value="visio" {% if event and event.mode == 'visio' %}selected{% endif %}>🖥️ Visioconférence</option>
                    <option value="presentiel" {% if event and event.mode == 'presentiel' %}selected{% endif %}>📍 Présentiel</option>
                </select>
            </div>
            <div class="form-group" style="flex:1;">
                <label for="places_max">Nombre de places max *</label>
                <input type="number" id="places_max" name="places_max" min="1" max="500"
                       value="{{ event.places_max if event else 30 }}"
                       placeholder="30">
            </div>
        </div>

        <div class="form-group" id="lieu-group">
            <label for="lieu" id="lieu-label">Lien visio / Adresse</label>
            <input type="text" id="lieu" name="lieu"
                   value="{{ event.lieu if event else '' }}"
                   placeholder="https://meet.google.com/... ou adresse physique">
            <small class="form-note" id="lieu-hint">Lien de connexion (sera envoyé aux inscrits)</small>
        </div>

        <div class="form-group form-check">
            <input type="checkbox" id="publier" name="publier" value="1"
                   {% if event and event.is_published %}checked{% endif %}>
            <label for="publier">Publier immédiatement (visible sur le site)</label>
        </div>

        <div style="display:flex; gap:12px;">
            <button type="submit" class="btn btn-primary">
                {% if event %}Enregistrer les modifications{% else %}Créer la rencontre{% endif %}
            </button>
            <a href="{{ url_for('admin.rencontres') }}" class="btn btn-outline">Annuler</a>
        </div>

    </form>

</div>
</section>

<script>
function toggleLieu() {
    const mode  = document.getElementById('mode').value;
    const label = document.getElementById('lieu-label');
    const hint  = document.getElementById('lieu-hint');
    const input = document.getElementById('lieu');
    if (mode === 'visio') {
        label.textContent = 'Lien de connexion (visio)';
        hint.textContent  = 'Lien Zoom, Google Meet, Teams… sera envoyé aux inscrits';
        input.placeholder = 'https://meet.google.com/...';
    } else {
        label.textContent = 'Adresse du lieu';
        hint.textContent  = 'Adresse complète de la rencontre physique';
        input.placeholder = '12 rue de la République, Saint-Denis 97400';
    }
}
toggleLieu();
</script>
{% endblock %}
